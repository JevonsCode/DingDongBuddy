name: Request a feature
description: Suggest an improvement for DingDong.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Tell us about the time or attention this feature would give back to you. Please do not include private clipboard content, credentials, company information, or local paths.
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the workflow and why the current experience gets in the way.
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: What would you like DingDong to do?
      description: A rough idea is enough; screenshots or examples are welcome after removing private information.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: What do you do today?
      description: Optional. Explain any workaround you currently use.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed clipboard contents, secrets, personal/company information, usernames, and local file paths from this request.
          required: true
