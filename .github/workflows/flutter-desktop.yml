name: Flutter desktop

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

permissions:
  contents: read

jobs:
  macos-mcp:
    name: macos-mcp-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-15
          - arch: x86_64
            runner: macos-15-intel
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: 3.44.6
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Build and test native MCP
        run: |
          chmod +x scripts/build_macos_mcp.sh
          scripts/build_macos_mcp.sh "build/mcp-${{ matrix.arch }}" "${{ matrix.arch }}"
      - uses: actions/upload-artifact@v4
        with:
          name: mcp-macos-${{ matrix.arch }}
          path: build/mcp-${{ matrix.arch }}/bundle/
          if-no-files-found: error

  macos-mcp-universal:
    needs: macos-mcp
    runs-on: macos-15
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          name: mcp-macos-arm64
          path: ${{ runner.temp }}/mcp-arm64
      - uses: actions/download-artifact@v4
        with:
          name: mcp-macos-x86_64
          path: ${{ runner.temp }}/mcp-x86_64
      - name: Create and test dual-architecture MCP
        run: |
          chmod +x scripts/create_universal_macos_mcp.sh
          scripts/create_universal_macos_mcp.sh \
            "$RUNNER_TEMP/mcp-arm64" \
            "$RUNNER_TEMP/mcp-x86_64" \
            "$RUNNER_TEMP/mcp-universal"
          smoke_output="$RUNNER_TEMP/mcp-universal-tools-list.json"
          printf '%s\n' '{"jsonrpc":"2.0","id":1,"method":"tools/list","params":{}}' \
            | "$RUNNER_TEMP/mcp-universal/bin/dingdong_mcp" \
            > "$smoke_output"
          if ! grep -q '"result"' "$smoke_output" \
            || ! grep -q '"tools"' "$smoke_output"; then
            cat "$smoke_output"
            exit 1
          fi

  macos:
    name: macos-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-15
          - arch: x86_64
            runner: macos-15-intel
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: 3.44.6
          channel: stable
          cache: true
      - run: flutter config --enable-macos-desktop
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      - run: flutter build macos --debug
      - name: Verify macOS thinning contract
        run: |
          chmod +x scripts/thin_macos_app.sh
          scripts/thin_macos_app.sh \
            build/macos/Build/Products/Debug/DingDong.app \
            "${{ matrix.arch }}"
      - name: Verify macOS application architecture
        run: |
          app_binary="build/macos/Build/Products/Debug/DingDong.app/Contents/MacOS/DingDong"
          description="$(/usr/bin/file -b "$app_binary")"
          printf '%s\n' "$description"
          architectures="$(/usr/bin/lipo -archs "$app_binary")"
          test "$architectures" = "${{ matrix.arch }}"

  windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: 3.44.6
          channel: stable
          cache: true
      - run: flutter config --enable-windows-desktop
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test --exclude-tags golden
      - run: flutter build windows --debug
