name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tested version tag to publish
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
      - name: Verify tag matches application version
        shell: bash
        run: |
          tag_version="${RELEASE_TAG#v}"
          app_version="$(sed -n 's/^version: \([^+]*\).*/\1/p' pubspec.yaml)"
          test "$tag_version" = "$app_version"

  macos-mcp:
    needs: validate
    name: macos-mcp-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-15
          - arch: x86_64
            runner: macos-15-intel
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: 3.44.6
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Build and test native MCP
        run: |
          chmod +x scripts/build_macos_mcp.sh
          scripts/build_macos_mcp.sh "build/mcp-${{ matrix.arch }}" "${{ matrix.arch }}"
      - uses: actions/upload-artifact@v4
        with:
          name: mcp-macos-${{ matrix.arch }}
          path: build/mcp-${{ matrix.arch }}/bundle/
          if-no-files-found: error

  macos:
    needs: [validate, macos-mcp]
    runs-on: macos-15
    timeout-minutes: 45
    env:
      MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
      MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
      APTABASE_APP_KEY: ${{ secrets.APTABASE_APP_KEY }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: 3.44.6
          channel: stable
          cache: true
      - run: flutter config --enable-macos-desktop
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      - name: Build macOS release
        shell: bash
        run: |
          args=(build macos --release)
          if [ -n "$APTABASE_APP_KEY" ]; then
            args+=(--dart-define="APTABASE_APP_KEY=$APTABASE_APP_KEY")
          fi
          flutter "${args[@]}"
      - uses: actions/download-artifact@v4
        with:
          name: mcp-macos-arm64
          path: ${{ runner.temp }}/mcp-arm64
      - uses: actions/download-artifact@v4
        with:
          name: mcp-macos-x86_64
          path: ${{ runner.temp }}/mcp-x86_64
      - name: Install dual-architecture MCP in the application
        run: |
          chmod +x scripts/create_universal_macos_mcp.sh
          scripts/create_universal_macos_mcp.sh \
            "$RUNNER_TEMP/mcp-arm64" \
            "$RUNNER_TEMP/mcp-x86_64" \
            build/macos/Build/Products/Release/DingDong.app/Contents/MCP/bundle
          smoke_output="$RUNNER_TEMP/mcp-universal-tools-list.json"
          printf '%s\n' '{"jsonrpc":"2.0","id":1,"method":"tools/list","params":{}}' \
            | build/macos/Build/Products/Release/DingDong.app/Contents/MCP/bundle/bin/dingdong_mcp \
            > "$smoke_output"
          if ! grep -q '"result"' "$smoke_output" \
            || ! grep -q '"tools"' "$smoke_output"; then
            cat "$smoke_output"
            exit 1
          fi
      - name: Configure Developer ID signing
        if: env.MACOS_CERTIFICATE_BASE64 != ''
        run: |
          chmod +x scripts/setup_macos_distribution_signing.sh
          scripts/setup_macos_distribution_signing.sh
      - name: Seal macOS application bundle
        run: |
          chmod +x scripts/sign_macos_bundle.sh
          scripts/sign_macos_bundle.sh \
            build/macos/Build/Products/Release/DingDong.app \
            macos/Runner/Release.entitlements
      - name: Notarize and staple macOS application
        if: >-
          env.APPLE_ID != '' &&
          env.APPLE_TEAM_ID != '' &&
          env.APPLE_APP_PASSWORD != '' &&
          env.MACOS_CERTIFICATE_BASE64 != ''
        run: |
          chmod +x scripts/notarize_macos_artifact.sh
          scripts/notarize_macos_artifact.sh \
            build/macos/Build/Products/Release/DingDong.app
      - name: Package macOS application
        run: |
          VERSION="${RELEASE_TAG#v}"
          mkdir -p dist
          python3 -m venv "$RUNNER_TEMP/dmgbuild"
          "$RUNNER_TEMP/dmgbuild/bin/python" -m pip install \
            --disable-pip-version-check \
            "dmgbuild==1.6.7"
          chmod +x scripts/create_macos_dmg.sh
          DMGBUILD_BIN="$RUNNER_TEMP/dmgbuild/bin/dmgbuild" \
            scripts/create_macos_dmg.sh \
            build/macos/Build/Products/Release/DingDong.app \
            "dist/DingDong-${VERSION}-macos.dmg"
          ditto -c -k --sequesterRsrc --keepParent \
            build/macos/Build/Products/Release/DingDong.app \
            "dist/DingDong-${VERSION}-macos.zip"
      - name: Notarize and staple macOS installer
        if: >-
          env.APPLE_ID != '' &&
          env.APPLE_TEAM_ID != '' &&
          env.APPLE_APP_PASSWORD != '' &&
          env.MACOS_CERTIFICATE_BASE64 != ''
        run: scripts/notarize_macos_artifact.sh dist/*.dmg
      - uses: actions/upload-artifact@v4
        with:
          name: DingDong-macos
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: error

  windows:
    needs: validate
    runs-on: windows-latest
    timeout-minutes: 35
    env:
      APTABASE_APP_KEY: ${{ secrets.APTABASE_APP_KEY }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: 3.44.6
          channel: stable
          cache: true
      - run: flutter config --enable-windows-desktop
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test --exclude-tags golden
      - name: Build Windows release
        shell: pwsh
        run: |
          $arguments = @('build', 'windows', '--release')
          if ($env:APTABASE_APP_KEY) {
            $arguments += "--dart-define=APTABASE_APP_KEY=$env:APTABASE_APP_KEY"
          }
          flutter @arguments
      - name: Package Windows application
        shell: pwsh
        run: |
          $version = $env:RELEASE_TAG.Substring(1)
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path "build/windows/x64/runner/Release/*" -DestinationPath "dist/DingDong-$version-windows-x64.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: DingDong-windows
          path: dist/*.zip
          if-no-files-found: error

  publish:
    needs: [macos, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: DingDong-*
          path: dist
          merge-multiple: true
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          else
            gh release create "$RELEASE_TAG" dist/* \
              --repo "$GITHUB_REPOSITORY" \
              --title "DingDong ${RELEASE_TAG#v}" \
              --generate-notes
          fi
