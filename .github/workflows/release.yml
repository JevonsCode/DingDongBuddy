name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tested version tag to publish
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
      - name: Verify tag matches application version
        shell: bash
        run: |
          tag_version="${RELEASE_TAG#v}"
          app_version="$(sed -n 's/^version: \([^+]*\).*/\1/p' pubspec.yaml)"
          test "$tag_version" = "$app_version"

  macos:
    needs: validate
    runs-on: macos-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: 3.44.6
          channel: stable
          cache: true
      - run: flutter config --enable-macos-desktop
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      - run: flutter build macos --release
      - name: Seal macOS application bundle
        run: |
          chmod +x scripts/sign_macos_bundle.sh
          scripts/sign_macos_bundle.sh \
            build/macos/Build/Products/Release/DingDong.app \
            macos/Runner/Release.entitlements
      - name: Package macOS application
        run: |
          VERSION="${RELEASE_TAG#v}"
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent \
            build/macos/Build/Products/Release/DingDong.app \
            "dist/DingDong-${VERSION}-macos.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: DingDong-macos
          path: dist/*.zip
          if-no-files-found: error

  windows:
    needs: validate
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: 3.44.6
          channel: stable
          cache: true
      - run: flutter config --enable-windows-desktop
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test --exclude-tags golden
      - run: flutter build windows --release
      - name: Package Windows application
        shell: pwsh
        run: |
          $version = $env:RELEASE_TAG.Substring(1)
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path "build/windows/x64/runner/Release/*" -DestinationPath "dist/DingDong-$version-windows-x64.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: DingDong-windows
          path: dist/*.zip
          if-no-files-found: error

  publish:
    needs: [macos, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: DingDong-*
          path: dist
          merge-multiple: true
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/*.zip \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          else
            gh release create "$RELEASE_TAG" dist/*.zip \
              --repo "$GITHUB_REPOSITORY" \
              --title "DingDong ${RELEASE_TAG#v}" \
              --generate-notes
          fi
